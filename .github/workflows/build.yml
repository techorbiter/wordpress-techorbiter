name: Build and push custom WordPress php-fpm images

on:
  push:
    paths:
      - Dockerfile
      - config/**
  schedule:
    - cron: '0 4 * * 2'   # weekly rebuild (covers upstream updates)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4"]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=php${{ matrix.php }}-fpm
            type=raw,value=${{ matrix.php }}
            type=raw,value=${{ matrix.php }}-{{date 'YYYY-MM'}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true

          # PHP version selector
          build-args: |
            PHP_VERSION=${{ matrix.php }}

          # Multi-arch support
          platforms: linux/amd64,linux/arm64

          # Tags + labels
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Always pull latest base image
          pull: true

      - name: Delete old packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'wordpress'
          package-type: 'container'
          min-versions-to-keep: 20
